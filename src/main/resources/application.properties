# Application Configuration
spring.application.name=cashi-web-service
server.port=8085

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/cashi_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=America/Lima&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=25!@NsCt*
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# Logging Configuration
logging.level.root=INFO
logging.level.com.cashi=INFO
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=WARN

# SpringDoc OpenAPI Configuration
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.tryItOutEnabled=true
springdoc.packages-to-scan=com.cashi
springdoc.default-consumes-media-type=application/json
springdoc.default-produces-media-type=application/json

app.customer-sync.test-mode=false

# ============================
# Osiptel module (Fase 1 standalone)
# ============================
cashi.osiptel.legal-review.signed-off=true
cashi.osiptel.dispatcher-enabled=true
cashi.osiptel.candidate-cron-enabled=false
cashi.osiptel.worker-token=3a1586fab5cac405e4b1ec0d8195bb50e269c02e7a154d4662deea588d110a0a
cashi.osiptel.dni-hash-salt=97881378c4b52dfca512521e35a988bc8df74a830852a5548785dabebea25763

# Cooldown por resultado (no re-validar antes de):
cashi.osiptel.cooldown-ok-days=90
